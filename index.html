<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1410;--paper:#f4ede1;--paper-2:#ebe0cf;--rust:#b4421f;--rust-dk:#8a3216;
  --moss:#4a5d3a;--gold:#c08a2d;--line:#cdbfa6;--shadow:rgba(40,25,10,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;
  font-size:18px;line-height:1.65;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(192,138,45,.07), transparent 40%),
    radial-gradient(circle at 88% 78%, rgba(74,93,58,.07), transparent 42%);
  min-height:100vh;
}
.wrap{max-width:880px;margin:0 auto;padding:0 24px}
header.top{position:sticky;top:0;z-index:50;background:rgba(244,237,225,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:880px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--rust);box-shadow:0 0 0 4px rgba(180,66,31,.18)}
.langtog{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex-shrink:0}
.langtog button{font-family:'Spline Sans Mono',monospace;font-size:.72rem;font-weight:600;background:var(--paper);border:none;color:var(--ink);opacity:.5;cursor:pointer;padding:6px 11px;transition:all .16s}
.langtog button.active{background:var(--ink);color:var(--paper);opacity:1}

.hero{padding:78px 0 40px;position:relative}
.hero .eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.78rem;text-transform:uppercase;letter-spacing:.22em;color:var(--rust);margin-bottom:22px}
.hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.6rem,7vw,4.4rem);line-height:.98;letter-spacing:-.025em;margin-bottom:24px}
.hero h1 em{font-style:italic;color:var(--rust)}
.hero .lede{font-size:1.3rem;color:#4a3d30;text-wrap:pretty}

.pyramid{display:flex;flex-direction:column-reverse;align-items:center;gap:4px;margin:46px auto 0;max-width:720px}
.pyramid .lv{width:100%;padding:15px 22px;text-align:center;border-radius:7px;color:var(--paper);display:block;text-decoration:none;cursor:pointer;transition:transform .15s ease,filter .15s ease,box-shadow .15s ease}
.pyramid .lv:hover{filter:brightness(1.09);transform:translateY(-2px);box-shadow:0 6px 18px var(--shadow)}
.pyramid .lv:nth-child(1){background:#b4421f}
.pyramid .lv:nth-child(2){width:84%;background:#b06228}
.pyramid .lv:nth-child(3){width:67%;background:#6f7039}
.pyramid .lv:nth-child(4){width:52%;background:#4a5d3a}
.pyramid .lv .t{font-family:'Fraunces',serif;font-weight:600;font-size:.98rem}
.pyramid .lv .sub{font-family:'Newsreader',serif;font-style:italic;font-size:.8rem;line-height:1.32;margin-top:5px;opacity:.88;text-wrap:balance}

.courses{padding:18px 0 90px;display:flex;flex-direction:column;gap:22px}
.section-lbl{font-family:'Spline Sans Mono',monospace;font-size:.74rem;text-transform:uppercase;letter-spacing:.16em;color:var(--rust);margin:28px 0 4px}
.card{display:block;text-decoration:none;color:inherit;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:30px 32px;position:relative;scroll-margin-top:84px;transition:transform .2s,box-shadow .2s,border-color .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 34px var(--shadow);border-color:var(--rust)}
.card:target{border-color:var(--rust);box-shadow:0 0 0 2px var(--rust),0 14px 34px var(--shadow)}
.card .meta-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.card .cnum{font-family:'Spline Sans Mono',monospace;font-size:.78rem;letter-spacing:.12em;color:var(--rust);text-transform:uppercase}
.card .badge{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.06em;background:var(--ink);color:var(--paper);padding:3px 9px;border-radius:5px}
.card h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.06;letter-spacing:-.02em;margin-bottom:12px}
.card h2 em{font-style:italic;color:var(--rust)}
.card p{font-size:1.12rem;color:#4a3d30;max-width:56ch;margin-bottom:20px}
.card .go{display:inline-flex;align-items:center;gap:8px;font-family:'Spline Sans Mono',monospace;font-size:.82rem;font-weight:600;color:var(--rust-dk)}
.card .go .arrow{transition:transform .2s}
.card:hover .go .arrow{transform:translateX(5px)}

footer.foot{border-top:1px solid var(--line);padding:30px 0 60px}
footer.foot p{font-family:'Spline Sans Mono',monospace;font-size:.74rem;opacity:.55;text-align:center}

@media(max-width:560px){
  .pyramid .lv:nth-child(2){width:92%}
  .pyramid .lv:nth-child(3){width:84%}
  .pyramid .lv:nth-child(4){width:76%}
}
@media(max-width:640px){
  .hero{padding:54px 0 30px}
  .card{padding:24px 22px}
}
</style>
</head>
